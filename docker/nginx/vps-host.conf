# =============================================================
# /etc/nginx/sites-available/yokkutelabs.com
# Host Nginx reverse proxy to the Docker nginx container
# SSL handled by Certbot / Let's Encrypt
# =============================================================

server {
    listen 80;
    listen [::]:80;
    server_name yokkutelabs.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yokkutelabs.com;

    ssl_certificate /etc/letsencrypt/live/yokkutelabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yokkutelabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 12M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_read_timeout 60s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/yokkute.access.log;
    error_log /var/log/nginx/yokkute.error.log;
}
