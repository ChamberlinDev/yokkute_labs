# =============================================================
# /etc/nginx/sites-available/yokkutelabs.com
# Nginx hôte — reverse proxy direct vers PHP-FPM container
# SSL géré par Certbot / Let's Encrypt
# =============================================================

server {
    listen 80;
    server_name yokkutelabs.com www.yokkutelabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yokkutelabs.com www.yokkutelabs.com;

    # ── SSL Let's Encrypt (rempli par certbot) ────────────
    ssl_certificate     /etc/letsencrypt/live/yokkutelabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yokkutelabs.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Racine des fichiers publics Laravel ───────────────
    root /opt/yokkute_labs/public;
    index index.php;

    client_max_body_size 12M;

    # ── Assets statiques — servis directement par Nginx ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Storage public (CVs, images uploadées) ────────────
    location /storage {
        alias /opt/yokkute_labs/storage/app/public;
        try_files $uri =404;
    }

    # ── Point d'entrée Laravel ────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM container (port 9000 en local uniquement) ─
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_param  HTTPS on;
        fastcgi_read_timeout 60s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # ── Bloquer accès fichiers sensibles ──────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # ── Headers sécurité ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Logs ─────────────────────────────────────────────
    access_log /var/log/nginx/yokkutelabs.access.log;
    error_log  /var/log/nginx/yokkutelabs.error.log;
}
