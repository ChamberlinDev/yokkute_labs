map $http_x_forwarded_proto $app_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $http_x_forwarded_host $app_forwarded_host {
    default $http_x_forwarded_host;
    '' $host;
}

map $http_x_forwarded_port $app_forwarded_port {
    default $http_x_forwarded_port;
    '' $server_port;
}

map $http_x_forwarded_for $app_forwarded_for {
    default $http_x_forwarded_for;
    '' $remote_addr;
}

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 12M;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTP_X_FORWARDED_FOR $app_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $app_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $app_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_PROTO $app_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_SERVER $host;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
