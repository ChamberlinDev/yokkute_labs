x-laravel-service: &laravel-service
  image: yokkute_labs-app:latest
  restart: unless-stopped
  env_file: .env.production
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - yokkute_net
  volumes:
    - app_storage:/var/www/html/storage/app
    - app_logs:/var/www/html/storage/logs
    - public_uploads:/var/www/html/public/uploads

services:

  # ── Application PHP-FPM ──────────────────────────────────
  app:
    <<: *laravel-service
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yokkute_app
    ports:
      - "9000:9000"   # PHP-FPM accessible sur la VM

  # ── Nginx web server (reverse proxied by host Nginx) ──────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: yokkute_labs-nginx:latest
    container_name: yokkute_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    networks:
      - yokkute_net
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - public_uploads:/var/www/html/public/uploads:ro
      - app_storage:/var/www/html/storage/app:ro

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yokkute_postgres
    restart: unless-stopped
    env_file: .env.production
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yokkute_net

  # ── Queue Worker ─────────────────────────────────────────
  queue:
    <<: *laravel-service
    container_name: yokkute_queue
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  # ── Scheduler (cron Laravel) ─────────────────────────────
  scheduler:
    <<: *laravel-service
    container_name: yokkute_scheduler
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"

volumes:
  postgres_data:
  app_storage:
  app_logs:
  public_uploads:

networks:
  yokkute_net:
    driver: bridge
